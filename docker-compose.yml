version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: TUICord-mysql
    env_file:
      - .env
    environment:
      # These variables tell the container what to create on FIRST boot
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      - "--innodb-buffer-pool-size=256M"
      - "--innodb-log-buffer-size=16M"
      - "--max-connections=20"
      - "--performance-schema=OFF"
    #  - "--default-authentication-plugin=mysql_native_password"

    ports:
      - "3306:3306"

    volumes:
      # Map your specific local file to the internal entrypoint directory
      - ./src/main/java/com/c446/disctui_server/db/.create.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # Persistent data (keep this so your seed doesn't run every single time)
      - mysql_data:/var/lib/mysql

    healthcheck:
      # Note the double $$ for the root password
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data: